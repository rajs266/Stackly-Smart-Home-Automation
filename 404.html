<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="assets/top-logo.webp" type="image/webp" sizes="32x32">
  <title>Page Not Found | Stackly</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="error-body">
<script src="loader.js"></script>

<section class="error-page">
  <div class="error-inner">
    <div class="error-code float-anim">404</div>
    <h1 class="error-title reveal">Page <span class="grad-text">Not Found</span></h1>
    <p class="error-desc reveal d1">The page you are looking for does not exist, has been moved, or is not available yet.</p>
    <div class="error-actions reveal d2">
      <a href="index.html" class="btn-primary error-btn">&larr; Back to Home</a>
      <button type="button" class="error-back-btn" id="go-back-btn">Go Back</button>
    </div>
  </div>
</section>

<script src="app.js"></script>
<script>
  document.getElementById('go-back-btn').addEventListener('click', function () {
    if (window.history.length > 1) window.history.back();
    else window.location.href = 'index.html';
  });
</script>
</body>
</html>

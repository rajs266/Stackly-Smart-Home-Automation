<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In | Stackly</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { background: #030814; min-height: 100vh; display: flex; flex-direction: column; }
    .auth-page {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 100px 20px 60px;
    }
    .auth-card {
      background: rgba(255,255,255,0.035);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 24px;
      padding: 52px 44px;
      width: 100%;
      max-width: 440px;
      backdrop-filter: blur(20px);
    }
    .auth-logo { text-align:center; margin-bottom:28px; }
    .auth-logo img { height:40px; }
    .auth-card h2 { font-size:26px; font-weight:700; color:white; text-align:center; margin-bottom:6px; }
    .auth-card .sub { font-size:14px; color:rgba(255,255,255,0.5); text-align:center; margin-bottom:32px; }
    .form-group label { color:rgba(255,255,255,0.75) !important; }
    .form-group input {
      background:rgba(255,255,255,0.06) !important;
      border-color:rgba(255,255,255,0.12) !important;
      color:white !important;
    }
    .form-group input::placeholder { color:rgba(255,255,255,0.3); }
    .form-group input:focus { border-color:#0ea5e9 !important; }
    .forgot { text-align:right; margin-top:-12px; margin-bottom:20px; }
    .forgot a { font-size:13px; color:#7dd3fc; font-family:'Outfit',sans-serif; }
    .divider { display:flex; align-items:center; gap:12px; margin:24px 0; }
    .divider::before,.divider::after { content:''; flex:1; height:1px; background:rgba(255,255,255,0.1); }
    .divider span { font-size:12px; color:rgba(255,255,255,0.35); white-space:nowrap; }
    .auth-foot { text-align:center; margin-top:20px; font-size:14px; color:rgba(255,255,255,0.45); }
    .auth-foot a { color:#7dd3fc; }
    @media(max-width:480px){ .auth-card{ padding:36px 24px; } }
  </style>
</head>
<body>

<nav class="navbar nav-dark" id="navbar">
  <div class="nav-inner">
    <a href="index.html" class="nav-logo"><img src="assets/logo.webp" alt="Stackly"></a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="services.html">Services</a></li>
      <li><a href="blog.html">Blog</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
    <div class="nav-actions">
      <a href="signin.html" class="btn-signin" style="border-color:rgba(14,165,233,0.5);color:#7dd3fc;">Sign In</a>
      <a href="get-started.html" class="btn-primary">Get Started</a>
    </div>
    <button class="hamburger" id="ham-btn"><span></span><span></span><span></span></button>
  </div>
</nav>

<div class="mobile-menu" id="mob-menu">
  <a href="index.html">Home</a><a href="about.html">About</a><a href="services.html">Services</a><a href="blog.html">Blog</a><a href="contact.html">Contact</a>
  <div class="mob-actions"><a href="signin.html" class="btn-signin">Sign In</a><a href="get-started.html" class="btn-primary">Get Started</a></div>
</div>

<div class="auth-page">
  <div class="auth-card reveal">
    <div class="auth-logo"><img src="assets/logo.webp" alt="Stackly"></div>
    <h2>Welcome Back</h2>
    <p class="sub">Sign in to your Stackly account</p>

    <form>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" placeholder="your@email.com">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" placeholder="••••••••">
      </div>
      <div class="forgot"><a href="#">Forgot password?</a></div>
      <button type="submit" class="btn-primary" style="width:100%; padding:13px; font-size:15px;">Sign In</button>
    </form>

    <div class="divider"><span>or continue with</span></div>
    <button class="btn-cta ghost" style="width:100%; padding:12px; font-size:14px; border-radius:12px; font-family:'Outfit',sans-serif; font-weight:500; border:1px solid rgba(255,255,255,0.15); color:rgba(255,255,255,0.75);">
      🔵 Continue with Google
    </button>

    <div class="auth-foot">Don't have an account? <a href="get-started.html">Get Started Free</a></div>
  </div>
</div>

<script src="js/app.js"></script>
</body>
</html>

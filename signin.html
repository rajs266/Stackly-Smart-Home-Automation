<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In | Stackly</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    body {
      background: #030814;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background-image:
        radial-gradient(ellipse at 20% 50%, rgba(14,165,233,0.07) 0%, transparent 55%),
        radial-gradient(ellipse at 80% 20%, rgba(99,102,241,0.07) 0%, transparent 55%);
    }
    .auth-page {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 100px 20px 60px;
    }
    .auth-card {
      background: rgba(255,255,255,0.035);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 24px;
      padding: 52px 44px;
      width: 100%;
      max-width: 440px;
      backdrop-filter: blur(20px);
      animation: card-fade 0.6s ease both;
    }
    @keyframes card-fade { from { opacity:0; transform:translateY(24px); } to { opacity:1; transform:translateY(0); } }
    .auth-logo { text-align: center; margin-bottom: 28px; }
    .auth-logo img { height: 40px; }
    .auth-card h2 { font-size: 26px; font-weight: 700; color: white; text-align: center; margin-bottom: 6px; }
    .auth-card .sub { font-size: 14px; color: rgba(255,255,255,0.5); text-align: center; margin-bottom: 32px; }
    .form-group label { color: rgba(255,255,255,0.75) !important; }
    .form-group input {
      background: rgba(255,255,255,0.06) !important;
      border-color: rgba(255,255,255,0.12) !important;
      color: white !important;
    }
    .form-group input::placeholder { color: rgba(255,255,255,0.3); }
    .form-group input:focus { border-color: #0ea5e9 !important; box-shadow: 0 0 0 3px rgba(14,165,233,0.15) !important; }
    .forgot { text-align: right; margin-top: -12px; margin-bottom: 20px; }
    .forgot a { font-size: 13px; color: #7dd3fc; font-family: 'Outfit', sans-serif; }
    .divider { display: flex; align-items: center; gap: 12px; margin: 24px 0; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: rgba(255,255,255,0.1); }
    .divider span { font-size: 12px; color: rgba(255,255,255,0.35); white-space: nowrap; }
    .auth-foot { text-align: center; margin-top: 20px; font-size: 14px; color: rgba(255,255,255,0.45); }
    .auth-foot a { color: #7dd3fc; }
    .btn-google {
      width: 100%;
      padding: 12px;
      font-size: 14px;
      border-radius: 12px;
      font-family: 'Outfit', sans-serif;
      font-weight: 500;
      border: 1px solid rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.8);
      background: rgba(255,255,255,0.04);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      cursor: none;
      transition: all 0.3s ease;
    }
    .btn-google:hover {
      background: rgba(255,255,255,0.08);
      border-color: rgba(255,255,255,0.25);
    }
    @media(max-width:480px){ .auth-card { padding: 36px 24px; } }
  </style>
</head>
<body>

<nav class="navbar nav-dark" id="navbar">
  <div class="nav-inner">
    <a href="index.html" class="nav-logo"><img src="assets/logo.webp" alt="Stackly"></a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="services.html">Services</a></li>
      <li><a href="blog.html">Blog</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
    <div class="nav-actions">
      <a href="signin.html" class="btn-signin" style="border-color:rgba(14,165,233,0.5);color:#7dd3fc;">Sign In</a>
      <a href="get-started.html" class="btn-primary">Get Started</a>
    </div>
    <button class="hamburger" id="ham-btn" aria-label="Open menu"><span></span><span></span><span></span></button>
  </div>
</nav>

<div class="mobile-menu" id="mob-menu">
  <a href="index.html">Home</a><a href="about.html">About</a><a href="services.html">Services</a>
  <a href="blog.html">Blog</a><a href="contact.html">Contact</a>
  <div class="mob-actions">
    <a href="signin.html" class="btn-signin">Sign In</a>
    <a href="get-started.html" class="btn-primary">Get Started</a>
  </div>
</div>

<div class="auth-page">
  <div class="auth-card">
    <a href="index.html" class="auth-logo" style="display:inline-block;"><img src="assets/logo.webp" alt="Stackly"></a>
    <h2>Welcome Back</h2>
    <p class="sub">Sign in to your Stackly account</p>

    <form>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" placeholder="your@email.com">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" placeholder="••••••••">
      </div>
      <div class="forgot"><a href="404.html">Forgot password?</a></div>
      <button type="submit" class="btn-primary" style="width:100%; padding:13px; font-size:15px;">Sign In &rarr;</button>
    </form>

    <div class="divider"><span>or continue with</span></div>

    <button class="btn-google">
      <svg width="18" height="18" viewBox="0 0 24 24">
        <path fill="#4285f4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34a853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#fbbc05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
        <path fill="#ea4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Continue with Google
    </button>

    <div class="auth-foot">Don't have an account? <a href="get-started.html">Get Started Free</a></div>
  </div>
</div>

<script src="js/app.js"></script>
</body>
</html>
